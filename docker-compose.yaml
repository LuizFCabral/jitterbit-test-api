services:
  db:
    image: postgres:15
    container_name: postgres_orders
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      # Monta o arquivo SQL para inicialização automática
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      # Volume para os dados não sumirem quando o container parar
      - postgres_data:/var/lib/postgresql/data
    
volumes:
  postgres_data: